<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="game-frame" allow="autoplay; fullscreen; focus-without-user-activation" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin" allowfullscreen></iframe>

    <script>
        // Get the game URL from the address bar (e.g., loader.html?url=https://...)
        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get('url');
        
        if (gameUrl) {
            document.getElementById('game-frame').src = decodeURIComponent(gameUrl);
        }
    </script>
</body>
</html>
