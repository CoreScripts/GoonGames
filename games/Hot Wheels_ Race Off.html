<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Hot Wheels Race Off | Unity Player</title>
    
    <link rel="stylesheet" href="./style.css">

    <script>
        window.unityInstance = null;
    </script>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1" style="width: 100%; height: 100%; background: #000;"></canvas>

        <div id="unity-loading-bar">
            <div id="unity-logo"><img src="./thumb_2.jpg" style="width:150px;"></div>
            <div id="unity-game-name" style="color:white; font-family:sans-serif;">Hot Wheels Race Off</div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full" style="background:red; height:10px; width:0%;"></div>
            </div>
        </div>
    </div>

    <script>
        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const loadingBar = document.querySelector("#unity-loading-bar");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");

        // IMPORTANT: Ensure these filenames match the files in your /Build/ folder exactly
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/7a2dbded24d57e056180125b1583e7c4.loader.js";

        const config = {
            dataUrl: buildUrl + "/7aa58569a745d3a7067e52af05e7fb6f.data.br",
            frameworkUrl: buildUrl + "/cb68df8b6138accfef441a97d929e28f.framework.js.br",
            codeUrl: buildUrl + "/78a19b693935f3d4c4d402beb26482fe.wasm.br",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "madkidgames.com",
            productName: "Hot Wheels Race Off",
            productVersion: "1.1.11595",
        };

        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((instance) => {
                window.unityInstance = instance;
                loadingBar.style.display = "none";
            }).catch((message) => {
                console.error(message);
            });
        };
        document.body.appendChild(script);

        // Resize Logic
        function resizeCanvas() {
            const aspect = 16 / 9;
            let w = window.innerWidth;
            let h = window.innerHeight;
            if (w / h > aspect) {
                w = h * aspect;
            } else {
                h = w / aspect;
            }
            canvas.style.width = w + "px";
            canvas.style.height = h + "px";
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('load', resizeCanvas);
    </script>
</body>
</html>
