<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonGames REMAKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="games.js"></script>

    <style>
        * { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
        body { overflow-x: hidden; }
        #gameIframe { background: #000; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen">

    <nav class="sticky top-0 z-40 w-full bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-700 px-6 py-4 flex justify-between items-center">
        <div class="flex items-baseline gap-2">
            <h1 class="text-2xl font-black tracking-tighter uppercase">GoonGames</h1>
            <span class="text-xs font-bold text-blue-500">REMAKE</span>
        </div>
        <button id="settingsBtn" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-full transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </nav>

    <main id="homeView" class="max-w-7xl mx-auto p-6">
        <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <p class="col-span-full text-center opacity-50">Loading Games Catalog...</p>
        </div>
    </main>

    <section id="playerView" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
        <div class="p-4 bg-zinc-900 flex justify-between items-center border-b border-zinc-800">
            <h2 id="activeGameTitle" class="font-bold text-white uppercase tracking-widest text-sm">Game Title</h2>
            <button id="closePlayer" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-full font-bold transition">CLOSE</button>
        </div>
        <div class="flex-grow relative bg-zinc-950">
            <iframe id="gameIframe" src="" class="w-full h-full border-0 absolute inset-0" allowfullscreen></iframe>
        </div>
    </section>

    <div id="settingsModal" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-zinc-800 p-8 rounded-3xl w-full max-w-sm border border-zinc-200 dark:border-zinc-700">
            <h2 class="text-xl font-black mb-6 text-center">SETTINGS</h2>
            <div class="flex flex-col items-center gap-4 mb-8">
                <button id="themeToggle" class="relative w-20 h-10 bg-zinc-200 dark:bg-blue-600 rounded-full p-1 transition-all duration-500">
                    <div id="toggleCircle" class="absolute left-1 top-1 w-8 h-8 bg-white rounded-full flex items-center justify-center transition-all duration-500 transform dark:translate-x-10">
                        <span class="dark:hidden">☀️</span>
                        <span class="hidden dark:inline">🌙</span>
                    </div>
                </button>
            </div>
            <button id="closeSettings" class="w-full py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-bold">DONE</button>
        </div>
    </div>

    <script>
        // Use window.onload to ensure games.js is fully read by the browser
        window.onload = function() {
            const grid = document.getElementById('gameGrid');
            const home = document.getElementById('homeView');
            const player = document.getElementById('playerView');
            const iframe = document.getElementById('gameIframe');
            const activeTitle = document.getElementById('activeGameTitle');

            // 1. Check if the data exists
            if (typeof GAMES_DATA !== 'undefined') {
                grid.innerHTML = GAMES_DATA.map(game => `
                    <div class="group cursor-pointer" onclick="playGame('${game.id}')">
                        <div class="aspect-video bg-zinc-200 dark:bg-zinc-800 rounded-2xl overflow-hidden mb-3 border-2 border-transparent group-hover:border-blue-500 shadow-lg transition-all">
                            <img src="${game.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <h3 class="font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100 group-hover:text-blue-500 transition-all">${game.title}</h3>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `<p class="col-span-full text-red-500 text-center">Error: games.js failed to load.</p>`;
            }

            // 2. Game Logic
            window.playGame = function(id) {
                const game = GAMES_DATA.find(g => g.id === id);
                if (!game) return;
                activeTitle.innerText = game.title;
                iframe.src = game.url;
                home.classList.add('hidden');
                player.classList.remove('hidden');
            };

            document.getElementById('closePlayer').onclick = () => {
                iframe.src = ""; // RAM SAVER
                player.classList.add('hidden');
                home.classList.remove('hidden');
            };

            // 3. UI logic
            document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
            document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
            document.getElementById('themeToggle').onclick = () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            };

            // Apply saved theme
            if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
        };
    </script>
</body>
</html>
