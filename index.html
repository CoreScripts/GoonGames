<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonGames REMAKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 transition-colors duration-300">

    <nav class="sticky top-0 z-40 w-full bg-zinc-100 dark:bg-zinc-800 border-b border-zinc-200 dark:border-zinc-700 px-6 py-4 flex justify-between items-center">
        <div class="flex items-baseline gap-2">
            <h1 class="text-2xl font-black tracking-tighter">GoonGames</h1>
            <span class="text-xs font-light opacity-60">REMAKE</span>
        </div>
        <button id="settingsBtn" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-full transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </nav>

    <main id="homeView" class="max-w-7xl mx-auto p-6">
        <div id="gameGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            </div>
    </main>

    <section id="playerView" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
        <div class="p-4 bg-zinc-900 flex justify-between items-center text-white">
            <h2 id="activeGameTitle" class="font-bold">Game Title</h2>
            <button id="closePlayer" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-medium transition">Close Game</button>
        </div>
        
        <div class="flex-grow bg-zinc-800">
            <iframe id="gameIframe" src="" class="w-full h-full border-0"></iframe>
        </div>

        <div class="p-4 bg-zinc-900 flex gap-4 justify-center items-center border-t border-zinc-800">
            <button id="fsBtn" class="bg-zinc-700 px-4 py-2 rounded hover:bg-zinc-600 text-sm">Fullscreen</button>
            <button id="tabBtn" class="bg-zinc-700 px-4 py-2 rounded hover:bg-zinc-600 text-sm">New Tab</button>
            <a id="sourceBtn" target="_blank" class="bg-zinc-700 px-4 py-2 rounded hover:bg-zinc-600 text-sm">View Source</a>
        </div>
    </section>

   <div id="settingsModal" class="hidden fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white dark:bg-zinc-800 p-8 rounded-3xl w-full max-w-md shadow-2xl border border-zinc-200 dark:border-zinc-700">
        <h2 class="text-2xl font-black mb-8 text-center">Settings</h2>
        
        <div class="flex flex-col items-center gap-4 mb-8">
            <span class="text-sm font-medium opacity-70 uppercase tracking-widest">Appearance</span>
            
<button id="themeToggle" class="relative w-24 h-12 bg-zinc-200 dark:bg-zinc-700 rounded-full p-1 transition-all duration-500 ease-in-out cursor-pointer focus:outline-none">
    <div id="toggleCircle" class="pointer-events-none absolute left-1 top-1 w-10 h-10 bg-white dark:bg-zinc-900 rounded-full shadow-md flex items-center justify-center transition-all duration-500 ease-in-out transform dark:translate-x-12">
        <svg id="sunIcon" class="w-6 h-6 text-yellow-500 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
        <svg id="moonIcon" class="w-6 h-6 text-blue-400 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
    </div>
</button>
        </div>

        <button id="closeSettings" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-500/30">Save Changes</button>
    </div>
</div>
    
    <script src="games.js"></script>
    <script src="script.js"></script>
</body>
</html>
