<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="tabTitle">GOONGAMES</title>
    
    <link id="tabIcon" rel="icon" type="image/png" href="droplet.png">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.classList.toggle('dark', savedTheme === 'dark');
            const cloakTitle = localStorage.getItem('cloakTitle');
            const cloakIcon = localStorage.getItem('cloakIcon');
            if (cloakTitle) document.title = cloakTitle;
            if (cloakIcon) {
                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.href = cloakIcon;
                document.getElementsByTagName('head')[0].appendChild(link);
            }
        })();
        tailwind.config = { darkMode: 'class' }
    </script>

    <script src="games.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        .preload * { transition: none !important; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        /* Notification Animation */
        @keyframes slideUp {
            from { transform: translateY(100%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .toast-animate { animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Star Pop Animation */
        .star-pop { animation: starScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes starScale {
            0% { transform: scale(1); }
            50% { transform: scale(1.5) rotate(15deg); }
            100% { transform: scale(1); }
        }

        /* Game Launch Zoom */
        .launching { 
            transform: scale(1.15) !important; 
            opacity: 0; 
            filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
            z-index: 50;
        }

        .logo-img { filter: invert(1); transition: filter 0.3s ease; }
        .dark .logo-img { filter: invert(0); }
    </style>
</head>
<body class="preload bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen font-sans overflow-x-hidden">

    <div id="notificationContainer" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <nav class="sticky top-0 z-40 w-full bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-700 px-4 py-3 flex flex-wrap gap-4 justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="droplet.png" class="w-8 h-8 object-contain logo-img" alt="Logo">
            <h1 class="text-xl font-black tracking-tighter uppercase">GOONGAMES</h1>
        </div>

        <div class="flex-grow max-w-md relative order-3 sm:order-none">
            <input type="text" id="searchInput" placeholder="Search games..." 
                class="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full py-2 px-10 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <svg class="absolute left-3 top-2.5 text-zinc-400" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>

        <button id="settingsBtn" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-full transition-all active:scale-90">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </nav>

    <main id="homeView" class="max-w-7xl mx-auto p-6 space-y-12">
        <section id="favoritesSection" class="hidden">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] text-yellow-500 mb-6 flex items-center gap-2">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                Favourited
            </h2>
            <div id="favGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 border-b border-zinc-200 dark:border-zinc-800 pb-12"></div>
        </section>

        <section id="librarySection">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6">Library</h2>
            <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </section>
    </main>

    <section id="playerView" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
        <div class="p-4 bg-zinc-900 flex justify-between items-center border-b border-zinc-800">
            <h2 id="activeGameTitle" class="font-bold text-white uppercase tracking-widest text-sm">Game Title</h2>
            <button id="closePlayer" class="px-6 py-2 bg-red-600 text-white rounded-full font-bold text-xs uppercase active:scale-95">Close</button>
        </div>
        <div class="flex-grow relative overflow-hidden">
            <iframe id="gameIframe" src="" class="w-full h-full border-0 absolute inset-0" allow="autoplay; fullscreen" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin" allowfullscreen></iframe>
        </div>
        <div class="p-3 bg-zinc-900 flex gap-6 justify-center">
            <button onclick="document.getElementById('gameIframe').requestFullscreen()" class="text-zinc-400 hover:text-white text-[10px] font-bold uppercase active:scale-95">Fullscreen</button>
            <button id="tabBtn" class="text-zinc-400 hover:text-white text-[10px] font-bold uppercase active:scale-95">New Tab</button>
        </div>
    </section>

    <div id="settingsModal" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-zinc-800 p-8 rounded-3xl w-full max-w-sm border border-zinc-200 dark:border-zinc-700 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-center uppercase tracking-tighter">Settings</h2>
            <button id="themeToggle" class="w-full py-4 mb-4 bg-zinc-100 dark:bg-zinc-700 rounded-xl font-bold text-xs uppercase tracking-widest">Toggle Theme</button>
            <button id="openCloakBtn" class="w-full py-4 mb-4 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest">Tab Cloak</button>
            <button id="closeSettings" class="w-full py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-bold">DONE</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('gameGrid');
        const favGrid = document.getElementById('favGrid');
        const favSection = document.getElementById('favoritesSection');
        const searchInput = document.getElementById('searchInput');
        const home = document.getElementById('homeView');
        const player = document.getElementById('playerView');
        const iframe = document.getElementById('gameIframe');
        const activeTitle = document.getElementById('activeGameTitle');

        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        function showNotification(message, gameImg) {
            const container = document.getElementById('notificationContainer');
            const toast = document.createElement('div');
            toast.className = 'toast-animate flex items-center gap-3 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 p-3 rounded-2xl shadow-2xl min-w-[200px] pointer-events-auto';
            toast.innerHTML = `
                <img src="${gameImg}" class="w-8 h-8 rounded-lg object-cover">
                <span class="text-xs font-bold uppercase tracking-tight">${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function renderCard(game) {
            const isFav = favorites.includes(game.id);
            return `
                <div id="card-${game.id}" class="group relative transition-all duration-300">
                    <button onclick="toggleFav('${game.id}', event)" class="absolute top-2 right-2 z-10 p-2 rounded-full bg-black/40 backdrop-blur-md active:scale-125 transition-transform">
                        <svg class="star-icon ${isFav ? 'star-pop' : ''}" width="16" height="16" fill="${isFav ? '#facc15' : 'none'}" stroke="${isFav ? '#facc15' : 'white'}" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                        </svg>
                    </button>
                    <div class="cursor-pointer" onclick="playGame('${game.id}')">
                        <div class="aspect-video bg-zinc-800 rounded-2xl overflow-hidden mb-3 border-2 border-transparent group-hover:border-blue-500 transition-all">
                            <img src="${game.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy">
                        </div>
                        <h3 class="font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100">${game.title}</h3>
                    </div>
                </div>
            `;
        }

        window.toggleFav = function(id, event) {
            event.stopPropagation();
            const game = GAMES_DATA.find(g => g.id === id);
            const becomingFav = !favorites.includes(id);
            
            favorites = becomingFav ? [...favorites, id] : favorites.filter(f => f !== id);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            
            showNotification(becomingFav ? `Added to favorites` : `Removed from favorites`, game.image);
            init(searchInput.value);
        };

        window.playGame = function(id) {
            const game = GAMES_DATA.find(g => g.id === id);
            if (!game) return;

            // Trigger Launch Animation
            const card = document.getElementById(`card-${id}`);
            if(card) card.classList.add('launching');

            // Delay for animation
            setTimeout(() => {
                activeTitle.innerText = game.title;
                iframe.src = game.url;
                
                document.getElementById('tabBtn').onclick = () => {
                    const win = window.open('about:blank', '_blank');
                    const cloakT = localStorage.getItem('cloakTitle') || "My Drive";
                    const cloakI = localStorage.getItem('cloakIcon') || "droplet.png";
                    win.document.write(`<html><head><title>${cloakT}</title><link rel="icon" href="${cloakI}"><style>body,html{margin:0;padding:0;height:100vh;overflow:hidden;background:#000;}iframe{border:none;width:100%;height:100%;}</style></head><body><iframe src="${game.url}"></iframe></body></html>`);
                    win.document.close();
                };

                home.classList.add('hidden');
                player.classList.remove('hidden');
                if(card) card.classList.remove('launching');
            }, 400);
        };

        function init(filter = "") {
            document.body.classList.remove('preload');
            if (typeof GAMES_DATA === 'undefined') return;
            const filteredGames = GAMES_DATA.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));
            grid.innerHTML = filteredGames.map(game => renderCard(game)).join('');
            
            const favGames = GAMES_DATA.filter(g => favorites.includes(g.id));
            if (favGames.length > 0 && filter === "") {
                favSection.classList.remove('hidden');
                favGrid.innerHTML = favGames.map(game => renderCard(game)).join('');
            } else { favSection.classList.add('hidden'); }
        }

        document.getElementById('closePlayer').onclick = () => { iframe.src = ""; player.classList.add('hidden'); home.classList.remove('hidden'); };
        document.getElementById('themeToggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };
        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
        searchInput.oninput = (e) => init(e.target.value);
        window.onload = () => init();
    </script>
</body>
</html>
