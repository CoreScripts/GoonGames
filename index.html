<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonGames REMAKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { transition: background-color 0.2s, color 0.2s; }
        .dark body { background-color: #18181b; color: #f4f4f5; }
        body { background-color: #f4f4f5; color: #18181b; }
    </style>
</head>
<body class="min-h-screen font-sans">

    <nav class="p-4 border-b border-zinc-200 dark:border-zinc-800 flex justify-between items-center sticky top-0 bg-inherit z-40">
        <h1 class="font-black text-xl tracking-tighter">GOONGAMES <span class="text-blue-500 text-xs">REMAKE</span></h1>
        <button id="settingsBtn" class="p-2 bg-zinc-200 dark:bg-zinc-800 rounded-lg">⚙️</button>
    </nav>

    <main class="p-6 max-w-6xl mx-auto">
        <div id="gameGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="playerView" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
        <div class="p-4 flex justify-between items-center bg-zinc-900 text-white">
            <span id="activeTitle" class="font-bold"></span>
            <button onclick="closeGame()" class="bg-red-600 px-4 py-1 rounded-full font-bold">CLOSE</button>
        </div>
        <iframe id="gameIframe" class="flex-grow w-full h-full border-0"></iframe>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 z-[60] bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-zinc-800 p-8 rounded-2xl w-80 text-center shadow-2xl">
            <h2 class="font-bold mb-4">THEME</h2>
            <button id="themeToggle" class="w-16 h-8 bg-zinc-300 dark:bg-blue-600 rounded-full relative transition-all">
                <div class="absolute top-1 left-1 dark:left-9 w-6 h-6 bg-white rounded-full transition-all"></div>
            </button>
            <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="mt-6 block w-full py-2 bg-zinc-100 dark:bg-zinc-700 rounded-lg">Done</button>
        </div>
    </div>

    <script src="games.js"></script>

    <script>
        // Check if games.js exists
        window.addEventListener('load', () => {
            const grid = document.getElementById('gameGrid');
            
            if (typeof GAMES_DATA === 'undefined') {
                grid.innerHTML = "<p class='text-red-500'>Error: games.js file not found or contains an error.</p>";
                return;
            }

            // Render Games
            grid.innerHTML = GAMES_DATA.map(game => `
                <div onclick="openGame('${game.url}', '${game.title}')" class="cursor-pointer group">
                    <div class="aspect-video bg-zinc-300 dark:bg-zinc-800 rounded-xl overflow-hidden mb-2 border-2 border-transparent group-hover:border-blue-500 transition-all">
                        <img src="${game.image}" class="w-full h-full object-cover">
                    </div>
                    <p class="text-sm font-bold opacity-70 uppercase tracking-tighter">${game.title}</p>
                </div>
            `).join('');
        });

        // Toggle Logic
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('gameTheme', isDark ? 'dark' : 'light');
        });

        // Load saved theme
        if (localStorage.getItem('gameTheme') === 'light') {
            document.documentElement.classList.remove('dark');
        }

        // Settings Modal
        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');

        // Player Functions
        function openGame(url, title) {
            document.getElementById('activeTitle').innerText = title;
            document.getElementById('gameIframe').src = url;
            document.getElementById('playerView').classList.remove('hidden');
        }

        function closeGame() {
            document.getElementById('gameIframe').src = "";
            document.getElementById('playerView').classList.add('hidden');
        }
    </script>
</body>
</html>
