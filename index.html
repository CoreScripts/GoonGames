<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="tabTitle">GOONGAMES</title>
    
    <link id="tabIcon" rel="icon" type="image/png" href="droplet.png">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.classList.toggle('dark', savedTheme === 'dark');
            const cloakTitle = localStorage.getItem('cloakTitle');
            const cloakIcon = localStorage.getItem('cloakIcon');
            if (cloakTitle) document.title = cloakTitle;
            if (cloakIcon) {
                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.href = cloakIcon;
                document.getElementsByTagName('head')[0].appendChild(link);
            }
        })();
        tailwind.config = { darkMode: 'class' }
    </script>

    <script src="games.js"></script>

    <style>
        * { 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            user-select: none;
        }
        input { user-select: text !important; }
        
        /* Grid and Card isolation */
        .game-grid { display: grid; gap: 2rem; }
        .game-card { position: relative; isolation: isolate; }

        .img-container { 
            transition: border-color 0.2s ease; 
            pointer-events: none; /* Prevents internal elements from messing with click detection */
        }

        .game-img { 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            pointer-events: none;
        }

        /* Hover & Tap Effects */
        .game-card:hover .game-img, 
        .game-card:active .game-img { transform: scale(1.08); }
        
        .game-card:hover .img-container, 
        .game-card:active .img-container { border-color: #3b82f6; }

        .logo-img { filter: invert(1); }
        .dark .logo-img { filter: invert(0); }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen font-sans">

    <nav class="sticky top-0 z-50 w-full bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-700 px-4 py-3 flex gap-4 justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="droplet.png" class="w-8 h-8 object-contain logo-img" alt="Logo">
            <h1 class="text-xl font-black tracking-tighter uppercase">GOONGAMES</h1>
        </div>
        <div class="flex-grow max-w-md relative">
            <input type="text" id="searchInput" placeholder="Search games..." 
                class="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full py-2 px-10 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <button id="settingsBtn" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-full active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </nav>

    <main id="homeView" class="max-w-7xl mx-auto p-6 space-y-12">
        <section id="favoritesSection" class="hidden">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] text-yellow-500 mb-6">Favorites</h2>
            <div id="favGrid" class="game-grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 border-b border-zinc-200 dark:border-zinc-800 pb-12"></div>
        </section>

        <section id="librarySection">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6">Library</h2>
            <div id="gameGrid" class="game-grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5"></div>
        </section>
    </main>

    <section id="playerView" class="hidden fixed inset-0 z-[60] bg-black flex flex-col">
        <div class="p-4 bg-zinc-900 flex justify-between items-center border-b border-zinc-800">
            <h2 id="activeGameTitle" class="font-bold text-white uppercase tracking-widest text-sm">Game</h2>
            <button id="closePlayer" class="px-6 py-2 bg-red-600 text-white rounded-full font-bold active:scale-95 text-xs">CLOSE</button>
        </div>
        <div class="flex-grow relative overflow-hidden">
            <iframe id="gameIframe" src="" class="w-full h-full border-0 absolute inset-0" allow="autoplay; fullscreen" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin" allowfullscreen></iframe>
        </div>
        <div class="p-3 bg-zinc-900 flex gap-6 justify-center">
            <button onclick="document.getElementById('gameIframe').requestFullscreen()" class="text-zinc-400 font-bold text-[10px] uppercase">Fullscreen</button>
            <button id="tabBtn" class="text-zinc-400 font-bold text-[10px] uppercase">New Tab</button>
        </div>
    </section>

    <script>
        const grid = document.getElementById('gameGrid');
        const favGrid = document.getElementById('favGrid');
        const favSection = document.getElementById('favoritesSection');
        const searchInput = document.getElementById('searchInput');
        const home = document.getElementById('homeView');
        const player = document.getElementById('playerView');
        const iframe = document.getElementById('gameIframe');
        const activeTitle = document.getElementById('activeGameTitle');

        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        function renderCard(game) {
            const isFav = favorites.includes(game.id);
            return `
                <div class="game-card group" data-id="${game.id}">
                    <button class="fav-btn absolute top-2 right-2 z-30 p-2 rounded-full bg-black/50 backdrop-blur-md active:scale-125 transition-transform" data-id="${game.id}">
                        <svg class="pointer-events-none" width="14" height="14" fill="${isFav ? '#facc15' : 'none'}" stroke="${isFav ? '#facc15' : 'white'}" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                        </svg>
                    </button>
                    <div class="img-container aspect-video bg-zinc-800 rounded-2xl overflow-hidden mb-3 border-2 border-transparent pointer-events-none">
                        <img src="${game.image}" draggable="false" class="game-img w-full h-full object-cover">
                    </div>
                    <h3 class="font-bold text-[10px] uppercase tracking-widest opacity-60 pointer-events-none">${game.title}</h3>
                </div>
            `;
        }

        // Global Click Listener (Solves the "wrong game" glitch)
        document.addEventListener('click', (e) => {
            const favBtn = e.target.closest('.fav-btn');
            const card = e.target.closest('.game-card');

            if (favBtn) {
                e.preventDefault();
                e.stopPropagation();
                const id = favBtn.dataset.id;
                favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
                localStorage.setItem('favorites', JSON.stringify(favorites));
                init(searchInput.value);
                return;
            }

            if (card) {
                playGame(card.dataset.id);
            }
        });

        window.playGame = function(id) {
            const game = GAMES_DATA.find(g => g.id === id);
            if (!game) return;
            activeTitle.innerText = game.title;
            iframe.src = game.url;
            
            document.getElementById('tabBtn').onclick = () => {
                const win = window.open('about:blank', '_blank');
                const cloakT = localStorage.getItem('cloakTitle') || "My Drive";
                const cloakI = localStorage.getItem('cloakIcon') || "droplet.png";
                win.document.write(`
                    <html>
                    <head><title>${cloakT}</title><link rel="icon" href="${cloakI}"><style>body,html{margin:0;padding:0;height:100vh;overflow:hidden;background:#000;}iframe{border:none;width:100%;height:100%;}</style></head>
                    <body><iframe src="${game.url}" allow="autoplay; fullscreen"></iframe></body>
                    </html>
                `);
                win.document.close();
            };
            home.classList.add('hidden');
            player.classList.remove('hidden');
        };

        function init(filter = "") {
            if (typeof GAMES_DATA === 'undefined') return;
            const filtered = GAMES_DATA.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));
            grid.innerHTML = filtered.map(game => renderCard(game)).join('');
            const favs = GAMES_DATA.filter(g => favorites.includes(g.id));
            if (favs.length > 0 && filter === "") {
                favSection.classList.remove('hidden');
                favGrid.innerHTML = favs.map(game => renderCard(game)).join('');
            } else { favSection.classList.add('hidden'); }
        }

        document.getElementById('closePlayer').onclick = () => { iframe.src = ""; player.classList.add('hidden'); home.classList.remove('hidden'); };
        searchInput.oninput = (e) => init(e.target.value);
        window.onload = () => init();
    </script>
</body>
</html>
