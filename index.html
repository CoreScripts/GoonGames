<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOONGAMES</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GOONGAMES">
    
    <link rel="icon" type="image/png" href="droplet.png">
    <link rel="apple-touch-icon" href="droplet.png">
    <link rel="manifest" href="data:application/manifest+json,{'name':'GOONGAMES','short_name':'GOONGAMES','start_url':'index.html','display':'standalone','background_color':'#09090b','theme_color':'#3b82f6','icons':[{'src':'droplet.png','sizes':'192x192','type':'image/png'}]}">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // 1. IMMEDIATE THEME CHECK (No Flicker)
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();

        tailwind.config = {
            darkMode: 'class',
        }

        // 2. Register Service Worker for PWA (Fullscreen proofing)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>

    <script src="games.js"></script>

    <style>
        .preload * { transition: none !important; }
        html, body, nav, section, div, h1, h2, h3, span, button, input {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        #toggleCircle { 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(0px); 
        }
        .dark #toggleCircle { transform: translateX(24px); }

        .sun-visible { display: block; }
        .moon-visible { display: none; }
        .dark .sun-visible { display: none; }
        .dark .moon-visible { display: block; }

        .star-icon { transition: transform 0.2s ease; }
        .star-icon:hover { transform: scale(1.2); }
    </style>
</head>
<body class="preload bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen font-sans">

    <nav class="sticky top-0 z-40 w-full bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-700 px-4 py-3 flex flex-wrap gap-4 justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="droplet.png" class="w-8 h-8 object-contain" alt="Logo">
            <div class="flex items-baseline gap-1">
                <h1 class="text-xl font-black tracking-tighter uppercase">GOONGAMES</h1>
                <span class="text-[10px] font-bold text-blue-500 uppercase">Remake</span>
            </div>
        </div>

        <div class="flex-grow max-w-md relative order-3 sm:order-none">
            <input type="text" id="searchInput" placeholder="Search games..." 
                class="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full py-2 px-10 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <svg class="absolute left-3 top-2.5 text-zinc-400" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>

        <button id="settingsBtn" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-full transition-all active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </nav>

    <main id="homeView" class="max-w-7xl mx-auto p-6 space-y-12">
        <section id="favoritesSection" class="hidden">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] text-yellow-500 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                Favourited
            </h2>
            <div id="favGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 border-b border-zinc-200 dark:border-zinc-800 pb-12"></div>
        </section>

        <section id="librarySection">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6">Library</h2>
            <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </section>
    </main>

    <section id="playerView" class="hidden fixed inset-0 z-50 bg-zinc-100 dark:bg-black flex flex-col">
        <div class="p-4 bg-white dark:bg-zinc-900 flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800">
            <h2 id="activeGameTitle" class="font-bold text-zinc-900 dark:text-white uppercase tracking-widest text-sm">Game Title</h2>
            <button id="closePlayer" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-full font-bold transition-all active:scale-95 text-xs uppercase">Close</button>
        </div>
        <div class="flex-grow relative bg-zinc-200 dark:bg-zinc-950">
            <iframe id="gameIframe" src="" class="w-full h-full border-0 absolute inset-0" allowfullscreen></iframe>
        </div>
        <div class="p-3 bg-white dark:bg-zinc-900 flex gap-6 justify-center border-t border-zinc-200 dark:border-zinc-800">
            <button onclick="document.getElementById('gameIframe').requestFullscreen()" class="text-zinc-500 dark:text-zinc-400 hover:text-blue-500 dark:hover:text-white text-[10px] font-bold uppercase tracking-widest">Fullscreen</button>
            <button id="tabBtn" class="text-zinc-500 dark:text-zinc-400 hover:text-blue-500 dark:hover:text-white text-[10px] font-bold uppercase tracking-widest">New Tab</button>
        </div>
    </section>

    <div id="settingsModal" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-zinc-800 p-8 rounded-3xl w-full max-w-sm border border-zinc-200 dark:border-zinc-700 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-center uppercase tracking-tighter">Settings</h2>
            <div class="flex flex-col items-center gap-4 mb-8">
                <span class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Toggle Appearance</span>
                <button id="themeToggle" class="relative w-14 h-8 bg-zinc-200 dark:bg-blue-600 rounded-full p-1 transition-colors duration-300 cursor-pointer focus:outline-none">
                    <div id="toggleCircle" class="w-6 h-6 bg-white rounded-full shadow-md flex items-center justify-center pointer-events-none">
                        <svg class="sun-visible w-4 h-4 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
                        <svg class="moon-visible w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
                    </div>
                </button>
            </div>
            <button id="closeSettings" class="w-full py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-bold transition hover:scale-95">DONE</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('gameGrid');
        const favGrid = document.getElementById('favGrid');
        const favSection = document.getElementById('favoritesSection');
        const searchInput = document.getElementById('searchInput');
        const home = document.getElementById('homeView');
        const player = document.getElementById('playerView');
        const iframe = document.getElementById('gameIframe');
        const activeTitle = document.getElementById('activeGameTitle');

        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        function renderCard(game) {
            const isFav = favorites.includes(game.id);
            return `
                <div class="group relative">
                    <button onclick="toggleFav('${game.id}', event)" class="absolute top-2 right-2 z-10 p-2 rounded-full bg-black/40 backdrop-blur-md transition-all active:scale-90 hover:bg-black/60">
                        <svg class="star-icon" width="16" height="16" fill="${isFav ? '#facc15' : 'none'}" stroke="${isFav ? '#facc15' : 'white'}" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                        </svg>
                    </button>
                    <div class="cursor-pointer" onclick="playGame('${game.id}')">
                        <div class="aspect-video bg-zinc-200 dark:bg-zinc-800 rounded-2xl overflow-hidden mb-3 border-2 border-transparent group-hover:border-blue-500 shadow-lg transition-all transform group-hover:-translate-y-1">
                            <img src="${game.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy">
                        </div>
                        <h3 class="font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100 group-hover:text-blue-500 transition-all">${game.title}</h3>
                    </div>
                </div>
            `;
        }

        function init(filter = "") {
            document.body.classList.remove('preload');
            if (typeof GAMES_DATA === 'undefined') return;

            const filteredGames = GAMES_DATA.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));
            grid.innerHTML = filteredGames.map(game => renderCard(game)).join('');

            const favGames = GAMES_DATA.filter(g => favorites.includes(g.id));
            if (favGames.length > 0 && filter === "") {
                favSection.classList.remove('hidden');
                favGrid.innerHTML = favGames.map(game => renderCard(game)).join('');
            } else {
                favSection.classList.add('hidden');
            }
        }

        searchInput.oninput = (e) => init(e.target.value);

        window.toggleFav = function(id, event) {
            event.stopPropagation();
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            init(searchInput.value);
        };

        window.playGame = function(id) {
            const game = GAMES_DATA.find(g => g.id === id);
            if (!game) return;
            activeTitle.innerText = game.title;
            iframe.src = game.url;
            document.getElementById('tabBtn').onclick = () => window.open(game.url, '_blank');
            home.classList.add('hidden');
            player.classList.remove('hidden');
        };

        document.getElementById('closePlayer').onclick = () => {
            iframe.src = ""; 
            player.classList.add('hidden');
            home.classList.remove('hidden');
        };

        document.getElementById('themeToggle').onclick = function() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        };

        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');

        window.onload = () => init();
    </script>
</body>
</html>
