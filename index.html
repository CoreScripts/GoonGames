<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonGames REMAKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This forces the toggle movement regardless of Tailwind bugs */
        .toggle-dot { transition: transform 0.3s ease-in-out; transform: translateX(0px); }
        .dark .toggle-dot { transform: translateX(32px); }
        * { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen">

    <nav class="p-4 border-b border-zinc-200 dark:border-zinc-800 flex justify-between items-center sticky top-0 bg-white dark:bg-zinc-900 z-40">
        <h1 class="font-black text-xl uppercase tracking-tighter">GoonGames <span class="text-blue-600 text-xs">REMAKE</span></h1>
        <button id="settingsBtn" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg">⚙️</button>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <p id="loadingText" class="col-span-full text-center opacity-50">Searching for games.js...</p>
        </div>
    </main>

    <div id="playerView" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
        <div class="p-4 flex justify-between items-center bg-zinc-900 text-white">
            <span id="activeTitle" class="font-bold uppercase text-sm tracking-widest"></span>
            <button onclick="closeGame()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-full font-black text-xs">CLOSE</button>
        </div>
        <iframe id="gameIframe" class="flex-grow w-full h-full border-0 bg-black"></iframe>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-zinc-800 p-8 rounded-3xl w-full max-w-xs shadow-2xl border border-zinc-200 dark:border-zinc-700">
            <h2 class="font-black text-center mb-8 uppercase tracking-widest">Settings</h2>
            
            <div class="flex flex-col items-center gap-4">
                <span class="text-[10px] font-bold opacity-50 uppercase">Appearance</span>
                <button id="themeToggle" class="w-16 h-8 bg-zinc-300 dark:bg-blue-600 rounded-full p-1 relative transition-colors">
                    <div class="toggle-dot w-6 h-6 bg-white rounded-full shadow flex items-center justify-center text-[10px]">
                        <span class="dark:hidden">☀️</span>
                        <span class="hidden dark:inline">🌙</span>
                    </div>
                </button>
            </div>

            <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="mt-8 w-full py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-bold">DONE</button>
        </div>
    </div>

    <script src="./games.js"></script>

    <script>
        const grid = document.getElementById('gameGrid');
        const player = document.getElementById('playerView');
        const iframe = document.getElementById('gameIframe');
        const activeTitle = document.getElementById('activeTitle');
        const settingsModal = document.getElementById('settingsModal');

        // 1. Initialize Grid
        function initGrid() {
            if (typeof GAMES_DATA !== 'undefined') {
                grid.innerHTML = GAMES_DATA.map(game => `
                    <div onclick="openGame('${game.url}', '${game.title}')" class="group cursor-pointer">
                        <div class="aspect-video bg-zinc-200 dark:bg-zinc-800 rounded-2xl overflow-hidden mb-2 border-2 border-transparent group-hover:border-blue-500 transition-all shadow-md">
                            <img src="${game.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest group-hover:opacity-100 group-hover:text-blue-500">${game.title}</p>
                    </div>
                `).join('');
            } else {
                document.getElementById('loadingText').innerText = "Error: games.js not found in this folder.";
            }
        }

        // 2. Player Logic
        window.openGame = function(url, title) {
            activeTitle.innerText = title;
            iframe.src = url;
            player.classList.remove('hidden');
        };

        window.closeGame = function() {
            iframe.src = ""; // RAM Saver
            player.classList.add('hidden');
        };

        // 3. Settings & Theme
        document.getElementById('settingsBtn').onclick = () => settingsModal.classList.remove('hidden');

        document.getElementById('themeToggle').onclick = () => {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        };

        // On Load
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
        
        // Short delay to ensure games.js is parsed
        setTimeout(initGrid, 100);
    </script>
</body>
</html>
